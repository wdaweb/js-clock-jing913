<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>時鐘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "微軟正黑體", sans-serif;
      color: #5366a7;
      background: linear-gradient(135deg, #eeeaff, #e2ebff, #def6ff);
      transition: background 0.3s, color 0.3s;
      overflow: hidden;
      padding: 20px;
    }

    /* 夜間模式背景 */
    body.dark {
      color: #dce4ff;
      background: linear-gradient(135deg, #171932, #1c2850, #12364b);
    }

    body.dark .clock-box {
      background: rgba(20, 28, 60, 0.35);
      border-color: rgba(255, 255, 255, 0.22);
    }

    body.dark .theme-button,
    body.dark .fullscreen-button,
    body.dark .focus-icon {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .clock-box {
      position: relative;
      width: 100%;
      height: calc(100vh - 40px);
      padding: 40px;
      overflow: hidden;

      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 15px 40px rgba(92, 108, 177, 0.15);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 35px;
    }

    .clock-box::before,
    .clock-box::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      opacity: 0.6;
    }

    .clock-box::before {
      left: -50px;
      bottom: -100px;
      background: rgba(255, 177, 230, 0.5);
    }

    .clock-box::after {
      top: -100px;
      right: -50px;
      background: rgba(154, 220, 255, 0.5);
    }

    .top-bar {
      position: absolute;
      top: 30px;
      left: 30px;
      right: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .focus-text {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .focus-icon {
      display: flex;
      width: 52px;
      height: 52px;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.45);
      box-shadow: 0 8px 20px rgba(92, 108, 177, 0.08);
      font-size: 20px;
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    .clock,
    #digitalTime,
    .date {
      position: relative;
      z-index: 2;
    }

    /* 按鈕樣式 */
    .theme-button,
    .fullscreen-button {
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 6px 18px rgba(85, 101, 170, 0.12);
      height: 44px;
      padding: 0 18px;
      border-radius: 16px;
      color: inherit;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      transition: 0.2s;
    }

    .fullscreen-button {
      display: flex;
      width: 44px;
      padding: 0;
      align-items: center;
      justify-content: center;
    }

    .fullscreen-button svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
    }

    .theme-button:hover,
    .fullscreen-button:hover {
      background: rgba(255, 255, 255, 0.55);
      transform: translateY(-2px);
    }

    body.dark .theme-button:hover,
    body.dark .fullscreen-button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .clock {
      position: relative;
      width: 360px;
      height: 360px;
      border: 6px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      background: rgba(215, 228, 255, 0.2);
      box-shadow:
        0 0 15px rgba(255, 255, 255, 0.9),
        0 0 38px rgba(103, 121, 205, 0.25);
    }

    body.dark .clock {
      background: rgba(33, 48, 96, 0.25);
    }

    .mark {
      position: absolute;
      width: 5px;
      height: 18px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 6px white;
      z-index: 1;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      border-radius: 10px;
      transform-origin: bottom center;
      z-index: 2;
    }

    .hour-hand {
      width: 10px;
      height: 95px;
      margin-left: -5px;
      background: linear-gradient(#5a9fec, #9a76ef);
      box-shadow: 0 5px 10px rgba(92, 96, 190, 0.3);
    }

    .minute-hand {
      width: 8px;
      height: 135px;
      margin-left: -4px;
      background: linear-gradient(#ee73df, #876fe9);
      box-shadow: 0 5px 10px rgba(190, 84, 194, 0.25);
    }

    .second-hand {
      width: 2px;
      height: 145px;
      margin-left: -1px;
      background: #5debd8;
      box-shadow: 0 0 6px #5debd8;
    }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 4px 10px rgba(67, 78, 145, 0.3);
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    #digitalTime {
      color: white;
      font-family: "Inconsolata", Consolas, monospace;
      font-size: 76px;
      font-weight: normal;
      letter-spacing: 3px;
      text-shadow:
        0 0 10px white,
        0 4px 8px rgba(58, 76, 172, 0.6),
        0 10px 26px rgba(58, 76, 172, 0.55);
    }

    .date {
      display: flex;
      gap: 24px;
      font-size: 21px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <main class="clock-box">
    <header class="top-bar">
      <div class="focus-text">
        <span class="focus-icon">▣</span>
        <span>專注於當下</span>
      </div>

      <div class="button-group">
        <button class="theme-button" id="themeButton" type="button">☾ 夜間模式</button>
        <button class="fullscreen-button" id="fullscreenButton" type="button" title="全螢幕">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 4h6v6M20 4l-7 7M10 20H4v-6M4 20l7-7"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="clock" id="clock">
      <div class="hour-hand hand" id="hourHand"></div>
      <div class="minute-hand hand" id="minuteHand"></div>
      <div class="second-hand hand" id="secondHand"></div>
      <div class="center-dot"></div>
    </div>

    <div id="digitalTime">00:00:00</div>

    <div class="date">
      <span id="dateText">0000 / 00 / 00</span>
      <span id="weekText">星期日</span>
    </div>
  </main>

  <script>
    const clock = document.getElementById('clock')
    const hourHand = document.getElementById('hourHand')
    const minuteHand = document.getElementById('minuteHand')
    const secondHand = document.getElementById('secondHand')
    const digitalTime = document.getElementById('digitalTime')
    const dateText = document.getElementById('dateText')
    const weekText = document.getElementById('weekText')
    const themeButton = document.getElementById('themeButton')
    const fullscreenButton = document.getElementById('fullscreenButton')

    const weekList = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六']

    // 12 個刻度
    for (let i = 0; i < 12; i++) {
      const mark = document.createElement('div')
      mark.className = 'mark'
      const angle = i * 30
      const radian = angle * Math.PI / 180
      mark.style.left = 50 + Math.sin(radian) * 45 + '%'
      mark.style.top = 50 - Math.cos(radian) * 45 + '%'
      mark.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`
      clock.appendChild(mark)
    }

    function addZero(number) {
      return String(number).padStart(2, '0')
    }

    function updateClock() {
      const now = new Date()
      const hours = now.getHours()
      const minutes = now.getMinutes()
      const seconds = now.getSeconds()

      hourHand.style.transform = `rotate(${hours * 30 + minutes * 0.5}deg)`
      minuteHand.style.transform = `rotate(${minutes * 6}deg)`
      secondHand.style.transform = `rotate(${seconds * 6}deg)`

      digitalTime.innerText = addZero(hours) + ':' + addZero(minutes) + ':' + addZero(seconds)
      dateText.innerText = now.getFullYear() + ' / ' + addZero(now.getMonth() + 1) + ' / ' + addZero(now.getDate())
      weekText.innerText = weekList[now.getDay()]
    }

    updateClock()
    setInterval(updateClock, 1000)

    // 切換夜間模式功能
    themeButton.addEventListener('click', function () {
      document.body.classList.toggle('dark')
      if (document.body.classList.contains('dark')) {
        themeButton.innerText = '☀ 日間模式'
      } else {
        themeButton.innerText = '☾ 夜間模式'
      }
    })

    // 切換全螢幕
    fullscreenButton.addEventListener('click', function () {
      if (document.fullscreenElement) {
        document.exitFullscreen()
      } else {
        document.documentElement.requestFullscreen()
      }
    })
  </script>
</body>

</html>
